name: Dispute Match Result

on:
  issues:
    types: [labeled]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dispute:
    if: github.event.label.name == 'dispute'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"

      - name: Log dispute
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: python .github/scripts/log_dispute.py

      - name: Commit dispute log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Disputes.csv
          git pull --rebase origin main
          git commit -m "Log dispute from issue #${{ github.event.issue.number }}" || echo "No changes to commit"
          git push
