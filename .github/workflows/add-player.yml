name: Add Player to ELO Database

on:
  issues:
    types: [opened]

jobs:
  add-player:
    if: contains(github.event.issue.labels.*.name, 'add-player')
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Parse issue and add player
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: python .github/scripts/add_player_from_issue.py

      - name: Commit updated CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ELO-Database.csv
          git commit -m "Add player from issue #${{ github.event.issue.number }}" || echo "No changes to commit"
          git push

      - name: Close issue
        uses: peter-evans/close-issue@v3
        with:
          comment: "✅ Player has been added to ELO-Database.csv successfully."
