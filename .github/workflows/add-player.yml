name: Add Player to ELO Database

on:
  issues:
    types: [labeled]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  add-player:
    if: github.event.label.name == 'add-player'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Parse issue and add player
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: python .github/scripts/add_player_from_issue.py

      - name: Commit and push with retry
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ELO_Database.csv
          git commit -m "Add player from issue #${{ github.event.issue.number }}" || { echo "Nothing to commit"; exit 0; }
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Push attempt $i failed, retrying..."
            sleep 3
          done

      - name: Close issue
        uses: peter-evans/close-issue@v3
        with:
          comment: "\u2705 Player has been added to ELO_Database.csv successfully."
