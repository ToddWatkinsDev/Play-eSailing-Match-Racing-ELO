name: Record Match Result

on:
  issues:
    types: [labeled]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  record-match:
    if: github.event.label.name == 'record-match'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Parse issue and record match
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: python .github/scripts/record_match_from_issue.py

      - name: Update README leaderboard
        run: python .github/scripts/update_readme.py

      - name: Commit and push with retry
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ELO_Database.csv Match_History.csv README.md
          git commit -m "Record match #${{ github.event.issue.number }} and update leaderboard" || { echo "Nothing to commit"; exit 0; }
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Push attempt $i failed, retrying..."
            sleep 3
          done

      - name: Close issue
        uses: peter-evans/close-issue@v3
        with:
          comment: "\u2705 Match result recorded and ELO ratings updated."
