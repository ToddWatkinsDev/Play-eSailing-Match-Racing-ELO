name: Record Match Result

on:
  issues:
    types: [opened]

jobs:
  record-match:
    if: contains(github.event.issue.labels.*.name, 'record-match')
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Parse issue and record match
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: python .github/scripts/record_match_from_issue.py

      - name: Commit updated CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ELO-Database.csv
          git commit -m "Record match result from issue #${{ github.event.issue.number }}" || echo "No changes to commit"
          git push

      - name: Close issue
        uses: peter-evans/close-issue@v3
        with:
          comment: "✅ Match result recorded and ELO ratings updated."
