name: Record Match Result

on:
  issues:
    types: [labeled]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  record-match:
    if: github.event.label.name == 'record-match'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"

      - name: Parse issue and record match
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: python .github/scripts/record_match_from_issue.py

      - name: Update README leaderboard
        run: python .github/scripts/update_readme.py

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ELO_Database.csv Match_History.csv README.md
          git pull --rebase origin main
          git commit -m "Record match #${{ github.event.issue.number }} and update leaderboard" || echo "No changes to commit"
          git push

      - name: Close issue
        uses: peter-evans/close-issue@v3
        with:
          comment: "✅ Match result recorded and ELO ratings updated."
